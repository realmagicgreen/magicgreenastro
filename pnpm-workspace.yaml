allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
overrides:
  # Security patches for transitive deps (see CHANGELOG 8.1.1)
  rollup: '>=4.59.0' # GHSA-mw96-cpmx-2vgc — arbitrary file write via path traversal
  yaml: '>=2.8.3' # GHSA-48c2-rrv3-qjmp — stack overflow via deeply nested collections
onlyBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver
